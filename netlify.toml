# ===========================================
# NETLIFY SECURITY HEADERS
# ===========================================
# Estos headers se aplican en producción cuando
# el sitio está desplegado en Netlify

[[headers]]
  for = "/*"
  [headers.values]
    # Previene clickjacking
    X-Frame-Options = "DENY"
    
    # Previene MIME type sniffing
    X-Content-Type-Options = "nosniff"
    
    # Activa protección XSS del navegador
    X-XSS-Protection = "1; mode=block"
    
    # Control de referrer
    Referrer-Policy = "strict-origin-when-cross-origin"
    
    # Permisos del navegador
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    
    # Content Security Policy (actualizado con todas las URLs necesarias)
    Content-Security-Policy = """
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval' https://sdk.mercadopago.com https://www.googletagmanager.com https://apis.google.com https://*.firebaseapp.com;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' data: https: blob:;
      connect-src 'self' https://sneaker-solid-backend.onrender.com https://*.firebaseapp.com https://*.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://api.mercadopago.com https://firestore.googleapis.com wss://*.firebaseio.com;
      frame-src 'self' https://www.mercadopago.com.ar https://www.mercadopago.com https://*.firebaseapp.com;
      object-src 'none';
      base-uri 'self';
      form-action 'self';
      upgrade-insecure-requests;
    """
    
    # HSTS - Force HTTPS
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# Cache de assets estáticos
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# No cachear HTML
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
